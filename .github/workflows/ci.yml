name: Minimal CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate structure
        run: |
          echo "Repository structure:"
          ls -la
          echo ""
          echo "README check:"
          if [ -f "README.md" ]; then
            echo "::notice::README.md found"
            wc -w README.md
          else
            echo "::warning::No README.md found"
          fi
          echo ""
          echo "License check:"
          if [ -f "LICENSE" ] || [ -f "LICENSE.md" ]; then
            echo "::notice::License file found"
          else
            echo "::warning::No license file found"
          fi

      - name: Success
        run: echo "::notice::Minimal CI validation passed"

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install declared runtime deps directly; pytest finds the packages via
          # pythonpath=["."] (the hatchling wheel build is a separate latent issue).
          pip install pydantic click pyyaml requests matplotlib numpy pytest

      - name: Run tests
        run: pytest -q
